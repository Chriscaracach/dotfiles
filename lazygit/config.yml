gui:
  nerdFontsVersion: "3"
  border: rounded
  theme:
    activeBorderColor:
      - "#88c0d0"
      - bold
    inactiveBorderColor:
      - "#4c566a"
    selectedLineBgColor:
      - "#3b4252"
    selectedRangeBgColor:
      - "#3b4252"
    cherryPickedCommitBgColor:
      - "#5e81ac"
    cherryPickedCommitFgColor:
      - "#eceff4"
    unstagedChangesColor:
      - "#bf616a"
    defaultFgColor:
      - "#eceff4"

git:
  paging:
    colorArg: always
    pager: delta --dark --line-numbers --side-by-side --syntax-theme Nord

os:
  editPreset: nvim
